<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FASD — Connexion Admin</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="page-main">
    <div class="page-content" style="max-width:400px;margin:auto;text-align:center;">

      <h1>Connexion Admin</h1>
      <p>Accès réservé à l’administration de FASD Zet’66</p>

      <form id="adminLoginForm" style="margin-top:2rem;">
        
        <div class="form-block">
          <label for="adminEmail">Email</label>
          <input type="email" id="adminEmail" required />
        </div>

        <div class="form-block">
          <label for="adminPassword">Mot de passe</label>
          <input type="password" id="adminPassword" required />
        </div>

        <p id="loginError" style="color:#ff9b9b;display:none;">Identifiants incorrects</p>

        <button type="submit" class="btn primary" style="margin-top:1rem;">Se connecter</button>
      </form>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase Auth (sécurisé côté serveur)
    const supabaseClient = supabase.createClient(
      "https://vanhcaicgzvavoqcnvbm.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhbmhjYWljZ3p2YXZvcWNudmJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyNDgwNTQsImV4cCI6MjA4NDgyNDA1NH0.PG_hpNFzZH9zGAVngpgKYUnS8_9LO7PHY72ilGojAXU"
    );

    const form = document.getElementById("adminLoginForm");
    const error = document.getElementById("loginError");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("adminEmail").value;
      const password = document.getElementById("adminPassword").value;

      const { data, error: signInError } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (signInError) {
        console.error("Erreur auth:", signInError);
        error.style.display = "block";
      } else if (data.user) {
        // Session établie
        window.location.href = "admin-dashboard.html";
      }
    });
  </script>

</body>
</html>
