<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FASD — Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    .admin-section {
      background: #1a1a1a;
      padding: 1.2rem;
      border-radius: 8px;
      margin: 1.5rem 0;
      border: 1px solid #333;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      padding: 0.3rem 0;
    }

    .section-header h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .toggle-icon {
      font-size: 1.4rem;
      opacity: 0.7;
      transition: transform 0.2s ease;
    }

    .open .toggle-icon {
      transform: rotate(90deg);
    }

    .section-content {
      display: none;
      margin-top: 1rem;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-block {
      margin-bottom: 1rem;
    }

    input, textarea, select {
      width: 100%;
      padding: 0.6rem;
      border-radius: 6px;
      border: 1px solid #444;
      background: #111;
      color: white;
      font-size: 1rem;
    }

    textarea {
      resize: vertical;
    }

    .admin-card {
      background: #222;
      padding: 1rem;
      border-radius: 6px;
      margin: 1rem 0;
      border: 1px solid #333;
    }

    .btn {
      padding: 0.6rem 1rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #444;
      color: white;
      font-size: 1rem;
    }

    .btn.primary {
      background: #0055ff;
    }

    .btn:hover {
      opacity: 0.85;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.6rem;
      }

      .admin-section {
        padding: 1rem;
      }

      .section-header h2 {
        font-size: 1.1rem;
      }

      .btn {
        width: 100%;
        margin-top: 0.5rem;
      }
    }
  </style>
</head>
<body>

  <main class="page-main">
    <div class="page-content" style="max-width:900px;margin:auto;">

      <h1>Espace Administrateur</h1>
      <p>Gérez facilement les contenus de l’association.</p>

      <button id="logoutBtn" class="btn primary" style="margin-bottom:2rem;">Déconnexion</button>

      <!-- POSTS -->
      <section id="posts" class="admin-section">
        <div class="section-header">
          <h2>Créer un post</h2>
          <span class="toggle-icon">▶</span>
        </div>

        <div class="section-content">
          <form id="postForm">

            <div class="form-block">
              <label for="postTitle">Titre du post</label>
              <input type="text" id="postTitle" required />
            </div>

            <div class="form-block">
              <label for="postContent">Contenu</label>
              <textarea id="postContent" rows="6" required></textarea>
            </div>

            <div class="form-block">
              <label for="postLocation">Où publier ?</label>
              <select id="postLocation" required>
                <option value="">-- Choisir --</option>
                <option value="physique-actu">Actualités Défense Physique</option>
                <option value="intellectuelle-actu">Actualités Défense Intellectuelle</option>
                <option value="physique-presse">Presse Défense Physique</option>
                <option value="intellectuelle-presse">Presse Défense Intellectuelle</option>
                <option value="accueil">Page d’accueil</option>
              </select>
            </div>

            <button type="submit" class="btn primary">Publier</button>
          </form>

          <h3 style="margin-top:2rem;">Posts existants</h3>
          <div id="postsList"></div>
        </div>
      </section>

      <!-- PROJETS -->
      <section id="projects" class="admin-section">
        <div class="section-header">
          <h2>Créer un projet</h2>
          <span class="toggle-icon">▶</span>
        </div>

        <div class="section-content">
          <form id="projectForm">

            <div class="form-block">
              <label for="projectTitle">Titre</label>
              <input type="text" id="projectTitle" required />
            </div>

            <div class="form-block">
              <label for="projectStatus">Statut</label>
              <select id="projectStatus" required>
                <option value="En cours">En cours</option>
                <option value="Terminé">Terminé</option>
                <option value="À venir">À venir</option>
              </select>
            </div>

            <div class="form-block">
              <label for="projectStart">Date de début</label>
              <input type="month" id="projectStart" required />
            </div>

            <div class="form-block">
              <label for="projectEnd">Date de fin</label>
              <input type="month" id="projectEnd" />
            </div>

            <div class="form-block">
              <label for="projectImage">Image (URL)</label>
              <input type="url" id="projectImage" />
            </div>

            <div class="form-block">
              <label for="projectLink">Lien externe</label>
              <input type="url" id="projectLink" />
            </div>

            <div class="form-block">
              <label for="projectDescription">Description</label>
              <textarea id="projectDescription" rows="5" required></textarea>
            </div>

            <button type="submit" class="btn primary">Enregistrer</button>
          </form>

          <h3 style="margin-top:2rem;">Projets existants</h3>
          <div id="projectsList"></div>
        </div>
      </section>

      <!-- RESSOURCES -->
      <section id="resources" class="admin-section">
        <div class="section-header">
          <h2>Ajouter une ressource</h2>
          <span class="toggle-icon">▶</span>
        </div>

        <div class="section-content">
          <form id="resourceForm">

            <div class="form-block">
              <label for="resourceTitle">Titre</label>
              <input type="text" id="resourceTitle" required />
            </div>

            <div class="form-block">
              <label for="resourceType">Type</label>
              <select id="resourceType" required>
                <option value="PDF">PDF</option>
                <option value="Vidéo">Vidéo</option>
                <option value="Article">Article</option>
                <option value="Outil">Outil</option>
                <option value="Autre">Autre</option>
              </select>
            </div>

            <div class="form-block">
              <label for="resourceCategory">Catégorie</label>
              <input type="text" id="resourceCategory" />
            </div>

            <div class="form-block">
              <label for="resourceLink">Lien</label>
              <input type="url" id="resourceLink" required />
            </div>

            <div class="form-block">
              <label for="resourceDescription">Description</label>
              <textarea id="resourceDescription" rows="4" required></textarea>
            </div>

            <button type="submit" class="btn primary">Enregistrer</button>
          </form>

          <h3 style="margin-top:2rem;">Ressources existantes</h3>
          <div id="resourcesList"></div>
        </div>
      </section>

      <!-- SIGNALEMENTS -->
      <section id="reports" class="admin-section">
        <div class="section-header">
          <h2>Signalements d’erreurs</h2>
          <span class="toggle-icon">▶</span>
        </div>

        <div class="section-content">
          <div id="reportsList"></div>
        </div>
      </section>

    </div>
  </main>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // Auth locale (comme avant)
    if (localStorage.getItem("adminLoggedIn") !== "true") {
      window.location.href = "admin-login.html";
    }

    const logoutBtn = document.getElementById("logoutBtn");
    logoutBtn.onclick = () => {
      localStorage.removeItem("adminLoggedIn");
      window.location.href = "admin-login.html";
    };

    // Sections repliables
    document.querySelectorAll(".admin-section").forEach(section => {
      const header = section.querySelector(".section-header");
      const content = section.querySelector(".section-content");

      header.onclick = () => {
        const isOpen = section.classList.toggle("open");
        content.style.display = isOpen ? "block" : "none";
      };
    });

    // --- Supabase init ---
    const supabaseClient = supabase.createClient(
      "https://vanhcaicgzvavoqcnvbm.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhbmhjYWljZ3p2YXZvcWNudmJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyNDgwNTQsImV4cCI6MjA4NDgyNDA1NH0.PG_hpNFzZH9zGAVngpgKYUnS8_9LO7PHY72ilGojAXU"
    );

    // -----------------------------
    // POSTS
    // -----------------------------
    const postForm = document.getElementById("postForm");
    const postsList = document.getElementById("postsList");

    async function loadPosts() {
      const { data, error } = await supabaseClient
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        postsList.innerHTML = "Erreur de chargement des posts";
        return;
      }

      postsList.innerHTML = "";

      data.forEach(post => {
        const div = document.createElement("div");
        div.className = "admin-card";

        div.innerHTML = `
          <h3>${post.title}</h3>
          <p><strong>Emplacement :</strong> ${post.location}</p>
          <p>${post.content}</p>
          <button class="btn delete-post" data-id="${post.id}">Supprimer</button>
        `;

        postsList.appendChild(div);
      });

      document.querySelectorAll(".delete-post").forEach(btn => {
        btn.onclick = () => deletePost(btn.dataset.id);
      });
    }

    async function deletePost(id) {
      const { error } = await supabaseClient
        .from("posts")
        .delete()
        .eq("id", id);

      if (error) {
        alert("Erreur suppression post : " + error.message);
        return;
      }

      loadPosts();
    }

    postForm.onsubmit = async (e) => {
      e.preventDefault();

      const { error } = await supabaseClient
        .from("posts")
        .insert({
          title: postTitle.value,
          content: postContent.value,
          location: postLocation.value
        });

      if (error) {
        alert("Erreur création post : " + error.message);
        return;
      }

      postForm.reset();
      loadPosts();
    };

    // -----------------------------
    // PROJECTS
    // -----------------------------
    const projectForm = document.getElementById("projectForm");
    const projectsList = document.getElementById("projectsList");

    async function loadProjects() {
      const { data, error } = await supabaseClient
        .from("projects")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        projectsList.innerHTML = "Erreur de chargement des projets";
        return;
      }

      projectsList.innerHTML = "";

      data.forEach(p => {
        const div = document.createElement("div");
        div.className = "admin-card";

        div.innerHTML = `
          <h3>${p.title}</h3>
          <p><strong>Statut :</strong> ${p.status}</p>
          <p><strong>Dates :</strong> ${p.start_date || ""} → ${p.end_date || "En cours"}</p>
          ${p.link ? `<p><a href="${p.link}" target="_blank">Lien externe</a></p>` : ""}
          <p>${p.description || ""}</p>
          <button class="btn delete-project" data-id="${p.id}">Supprimer</button>
        `;

        projectsList.appendChild(div);
      });

      document.querySelectorAll(".delete-project").forEach(btn => {
        btn.onclick = () => deleteProject(btn.dataset.id);
      });
    }

    async function deleteProject(id) {
      const { error } = await supabaseClient
        .from("projects")
        .delete()
        .eq("id", id);

      if (error) {
        alert("Erreur suppression projet : " + error.message);
        return;
      }

      loadProjects();
    }

    projectForm.onsubmit = async (e) => {
      e.preventDefault();

      const { error } = await supabaseClient
        .from("projects")
        .insert({
          title: projectTitle.value,
          status: projectStatus.value,
          start_date: projectStart.value,
          end_date: projectEnd.value || null,
          image: projectImage.value || null,
          link: projectLink.value || null,
          description: projectDescription.value
        });

      if (error) {
        alert("Erreur création projet : " + error.message);
        return;
      }

      projectForm.reset();
      loadProjects();
    };

    // -----------------------------
    // RESOURCES
    // -----------------------------
    const resourceForm = document.getElementById("resourceForm");
    const resourcesList = document.getElementById("resourcesList");

    async function loadResources() {
      const { data, error } = await supabaseClient
        .from("resources")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        resourcesList.innerHTML = "Erreur de chargement des ressources";
        return;
      }

      resourcesList.innerHTML = "";

      data.forEach(r => {
        const div = document.createElement("div");
        div.className = "admin-card";

        div.innerHTML = `
          <h3>${r.title}</h3>
          <p><strong>Type :</strong> ${r.type}</p>
          ${r.category ? `<p><strong>Catégorie :</strong> ${r.category}</p>` : ""}
          <p>${r.description}</p>
          <p><a href="${r.link}" target="_blank">Ouvrir</a></p>
          <button class="btn delete-resource" data-id="${r.id}">Supprimer</button>
        `;

        resourcesList.appendChild(div);
      });

      document.querySelectorAll(".delete-resource").forEach(btn => {
        btn.onclick = () => deleteResource(btn.dataset.id);
      });
    }

    async function deleteResource(id) {
      const { error } = await supabaseClient
        .from("resources")
        .delete()
        .eq("id", id);

      if (error) {
        alert("Erreur suppression ressource : " + error.message);
        return;
      }

      loadResources();
    }

    resourceForm.onsubmit = async (e) => {
      e.preventDefault();

      const { error } = await supabaseClient
        .from("resources")
        .insert({
          title: resourceTitle.value,
          type: resourceType.value,
          category: resourceCategory.value || null,
          link: resourceLink.value,
          description: resourceDescription.value
        });

      if (error) {
        alert("Erreur création ressource : " + error.message);
        return;
      }

      resourceForm.reset();
      loadResources();
    };

    // -----------------------------
    // REPORTS
    // -----------------------------
    const reportsList = document.getElementById("reportsList");

    async function loadReports() {
      const { data, error } = await supabaseClient
        .from("reports")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        reportsList.innerHTML = "Erreur de chargement des signalements";
        return;
      }

      reportsList.innerHTML = "";

      data.forEach(rep => {
        const div = document.createElement("div");
        div.className = "admin-card";

        const date = rep.created_at
          ? new Date(rep.created_at).toLocaleDateString("fr-FR")
          : "";

        div.innerHTML = `
          <h3>${rep.post_title || "Signalement"}</h3>
          <p>${rep.message || ""}</p>
          <p style="opacity:0.7;">${date}</p>
          <button class="btn delete-report" data-id="${rep.id}">Supprimer</button>
        `;

        reportsList.appendChild(div);
      });

      document.querySelectorAll(".delete-report").forEach(btn => {
        btn.onclick = () => deleteReport(btn.dataset.id);
      });
    }

    async function deleteReport(id) {
      const { error } = await supabaseClient
        .from("reports")
        .delete()
        .eq("id", id);

      if (error) {
        alert("Erreur suppression signalement : " + error.message);
        return;
      }

      loadReports();
    }

    // INIT
    loadPosts();
    loadProjects();
    loadResources();
    loadReports();
  </script>

</body>
</html>
